services:
  - type: worker
    name: facturaya-agents
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: RENDER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: OWNER_ID
        sync: false
      - key: BACKEND_SERVICE_ID
        sync: false
      - key: CAPSOLVER_API_KEY
        sync: false
